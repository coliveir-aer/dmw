<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOES-R ABI Derived Motion Winds (DMW) Viewer</title>
    
    <!-- Dashboard Dependencies -->
    <script src="https://cdn.tailwindcss.com/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Sandbox Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    
    <style>
        /* --- Layout Styles --- */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f1f5f9;
        }
        #sidebar {
            width: 340px;
            flex-shrink: 0;
            height: 100vh;
            background-color: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: margin-left 0.3s ease;
        }
        #sidebar.collapsed { margin-left: -340px; }
        #root {
            flex-grow: 1;
            height: 100vh;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 24px; border-radius: 8px; display: none; z-index: 100; }

        /* --- Sandbox Specific Styles --- */
        .main-layout { display: flex; height: 100%; }
        .content-grid { flex-grow: 1; background-color: #e9ecef; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .content-grid::-webkit-scrollbar { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .view-container { display: flex; flex-direction: column; background-color: #495057; border-radius: 0 8px 8px 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); overflow: hidden; height: 100%; min-height: 400px; position: relative; z-index: 5; }
        .view-header { background-color: #343a40; color: white; padding: 6px 12px; font-size: 0.9rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .view-canvas-wrapper { flex-grow: 1; position: relative; overflow: hidden; background: #111; cursor: grab; touch-action: none; }
        .view-canvas-wrapper:active { cursor: grabbing; }
        .view-status-bar { background-color: #1e293b; color: white; padding: 6px 12px; display: flex; align-items: center; gap: 12px; border-top: 1px solid #334155; font-size: 12px; z-index: 10; flex-shrink: 0; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.75); color: white; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .notification-container { position: fixed; bottom: 20px; right: 20px; z-index: 4000; display: flex; flex-direction: column; gap: 10px; }
        .notification-toast { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; border-radius: 5px; color: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.2); min-width: 250px; }
        
        .metadata-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 5px; }
        .metadata-table th, .metadata-table td { padding: 4px; border: 1px solid #ddd; text-align: left; word-break: break-word; }
        
        /* Float UI */
        .controls-float { position: absolute; right: 20px; top: 20px; background: rgba(0,0,0,0.75); color: white; padding: 10px; border-radius: 8px; z-index: 100; backdrop-filter: blur(4px); font-size: 12px; width: 160px; user-select: none; }
        .controls-float h4 { margin: 0 0 8px 0; font-size: 11px; text-transform: uppercase; color: #4db8ff; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .controls-float label { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        .controls-float input[type="range"] { width: 80px; }
        .btn-sm { background: #4db8ff; color: #000; border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-sm:hover { background: #80ccff; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        
        #legend-container { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.75); padding: 10px; border-radius: 6px; color: white; z-index: 100; width: 220px; }
        #legend { height: 12px; background: linear-gradient(to right, rgb(0,0,128), rgb(0,0,255), rgb(0,255,255), rgb(0,255,0), rgb(255,255,0), rgb(255,0,0)); border-radius: 2px; }
        #legend-labels { display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px; font-family: monospace; }
        
        #mobile-menu-btn { position: absolute; top: 10px; left: 10px; z-index: 50; background: #1e293b; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        @media (max-width: 1024px) {
            #sidebar { position: absolute; left: 0; top: 0; height: 100vh; width: 85vw; max-width: 340px; margin-left: 0; transform: translateX(0); transition: transform 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.5); overflow-y: auto; display: block; z-index: 40; }
            #sidebar.collapsed { transform: translateX(-100%); }
            .controls-float { top: 50px; }
            #domain-container { overflow-y: visible; flex: none; }
        }
    </style>
</head>
<body>
    <button id="mobile-menu-btn">☰ Menu</button>
    
    <!-- LEFT PANE: SIDEBAR -->
    <div id="sidebar" class="collapsed">
        <div class="p-5 border-b border-slate-200 bg-white shadow-sm z-10">
            <h1 class="text-xl font-bold text-slate-800 mb-4">DMW Dashboard</h1>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">Satellite</label>
                    <select id="satelliteSelect" class="w-full border border-slate-300 rounded p-2 bg-slate-50 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all cursor-pointer">
                        <option value="noaa-goes19">GOES-19 (East)</option>
                        <option value="noaa-goes18">GOES-18 (West)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">Target Date (UTC)</label>
                    <input type="date" id="dateInput" class="w-full border border-slate-300 rounded p-2 bg-slate-50 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer transition-all shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-700 mb-1">Click Action</label>
                    <div class="flex border border-slate-300 rounded overflow-hidden text-xs w-full shadow-sm">
                        <label class="flex-1 text-center bg-slate-50 py-2 cursor-pointer border-r border-slate-300 hover:bg-slate-100 flex items-center justify-center font-medium transition-colors">
                            <input type="radio" name="clickAction" value="load" checked class="mr-1.5"> Load
                        </label>
                        <label class="flex-1 text-center bg-slate-50 py-2 cursor-pointer hover:bg-slate-100 flex items-center justify-center font-medium transition-colors">
                            <input type="radio" name="clickAction" value="download" class="mr-1.5"> Download
                        </label>
                    </div>
                </div>
                
                <div class="mt-4 border-t border-slate-200 pt-4">
                    <h3 class="text-xs font-bold text-slate-800 mb-2 uppercase">Animation Settings</h3>
                    <div class="space-y-2 mb-3">
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-600 mb-1">Domain</label>
                            <select id="animDomain" class="w-full border border-slate-300 rounded p-1.5 bg-slate-50 text-xs focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-slate-600 mb-1">Product / Channel</label>
                            <select id="animProduct" class="w-full border border-slate-300 rounded p-1.5 bg-slate-50 text-xs focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none cursor-pointer"></select>
                        </div>
                    </div>
                    
                    <div class="space-y-3 mb-3 mt-3 border-t border-slate-200 pt-3">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-[10px] font-semibold text-slate-600">Start Time (UTC)</label>
                                <span id="animStartVal" class="text-xs font-mono font-bold text-indigo-600">00:00z</span>
                            </div>
                            <input type="range" id="animStart" min="0" max="1435" step="5" value="0" class="w-full cursor-pointer accent-indigo-600">
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-[10px] font-semibold text-slate-600">End Time (UTC)</label>
                                <span id="animEndVal" class="text-xs font-mono font-bold text-indigo-600">23:55z</span>
                            </div>
                            <input type="range" id="animEnd" min="0" max="1435" step="5" value="1435" class="w-full cursor-pointer accent-indigo-600">
                        </div>
                    </div>
                    
                    <button id="btnLoadAnim" class="mt-2 w-full bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] uppercase font-bold px-3 py-2 rounded transition-colors shadow-sm focus:ring-2 focus:ring-indigo-300 outline-none">
                        Load Animation
                    </button>
                </div>
            </div>
        </div>
        
        <!-- ACCORDION / DOMAIN LIST -->
        <div id="domain-container" class="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50">
            <!-- Dynamically populated via JS -->
        </div>
    </div>

    <div id="copyToast" class="toast">Action completed!</div>
    <div id="root"></div>

    <!-- --- Vanilla JS (Dashboard Logic) --- -->
    <script>
        const PRODUCTS = [
            { code: "ABI-L2-DMW", channel: "C02", name: "DMW Band 2 (Visible)" },
            { code: "ABI-L2-DMW", channel: "C07", name: "DMW Band 7 (Shortwave IR)" },
            { code: "ABI-L2-DMW", channel: "C08", name: "DMW Band 8 (Upper WV)" },
            { code: "ABI-L2-DMW", channel: "C09", name: "DMW Band 9 (Mid WV)" },
            { code: "ABI-L2-DMW", channel: "C10", name: "DMW Band 10 (Lower WV)" },
            { code: "ABI-L2-DMW", channel: "C14", name: "DMW Band 14 (IR Window)" },
            { code: "ABI-L2-DMWV", channel: "C08", name: "DMWV Band 8 (Clear Sky WV)" }
        ];

        const DOMAINS = [
            { id: "F", name: "Full Disk" },
            { id: "C", name: "CONUS" },
            { id: "M1", name: "Meso 1" },
            { id: "M2", name: "Meso 2" }
        ];

        const container = document.getElementById('domain-container');
        const dateInput = document.getElementById('dateInput');
        const copyToast = document.getElementById('copyToast');

        dateInput.onchange = () => {
            PRODUCTS.forEach(p => {
                DOMAINS.forEach(d => {
                    const el = document.getElementById(`results-${d.id}-${p.channel}-${p.code}`);
                    if(el) el.innerHTML = '<span class="text-slate-400 italic">Not scanned</span>';
                });
            });
        };

        function createSidebar() {
            const animDomainSelect = document.getElementById('animDomain');
            DOMAINS.forEach(dom => {
                const opt = document.createElement('option');
                opt.value = dom.id;
                opt.textContent = dom.name;
                if (dom.id === 'C') opt.selected = true;
                animDomainSelect.appendChild(opt);
            });

            const animProductSelect = document.getElementById('animProduct');
            PRODUCTS.forEach((prod, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.textContent = prod.name;
                if (index === 5) opt.selected = true;
                animProductSelect.appendChild(opt);
            });

            DOMAINS.forEach(dom => {
                let html = `<div class="bg-white border border-slate-200 rounded shadow-sm overflow-hidden">
                    <div class="bg-slate-100 p-3 flex justify-between items-center border-b border-slate-200">
                        <span class="font-bold text-slate-800 text-sm">${dom.name}</span>
                        <button onclick="scanDomain('${dom.id}')" class="bg-blue-600 hover:bg-blue-700 text-white text-[10px] uppercase font-bold px-3 py-1.5 rounded transition-colors shadow-sm focus:ring-2 focus:ring-blue-300 outline-none">Scan Domain</button>
                    </div>
                    <div class="p-3 space-y-4">`;
                
                PRODUCTS.forEach(prod => {
                    html += `<div>
                        <div class="text-xs font-semibold text-slate-600 mb-1.5 flex justify-between">
                            <span>${prod.name}</span>
                        </div>
                        <div id="results-${dom.id}-${prod.channel}-${prod.code}" class="flex flex-wrap gap-1.5 text-[10px]">
                            <span class="text-slate-400 italic">Not scanned</span>
                        </div>
                    </div>`;
                });

                html += `</div></div>`;
                container.innerHTML += html;
            });

            const now = new Date();
            let currentMins = now.getUTCHours() * 60 + now.getUTCMinutes();
            let targetDate = new Date();
            let startMins;

            if (currentMins < 360) {
                targetDate.setUTCDate(targetDate.getUTCDate() - 1);
                startMins = 1440 - 360 + currentMins;
                // DO NOT REVERT: Engine handles day boundary rollover
            } else {
                startMins = Math.max(0, currentMins - 360);
            }

            document.getElementById('dateInput').value = targetDate.toISOString().split('T')[0];
            
            const startInput = document.getElementById('animStart');
            const endInput = document.getElementById('animEnd');
            
            startInput.value = startMins;
            endInput.value = currentMins;
            
            document.getElementById('animStartVal').textContent = formatMinutes(startMins);
            document.getElementById('animEndVal').textContent = formatMinutes(currentMins);
        }

        async function scanDomain(domainId) {
            const bucket = document.getElementById('satelliteSelect').value;
            const dateStr = document.getElementById('dateInput').value;
            const dateObj = new Date(dateStr);
            const year = dateObj.getUTCFullYear();
            const start = new Date(Date.UTC(year, 0, 1));
            const doy = Math.floor((dateObj - start) / (1000 * 60 * 60 * 24)) + 1;
            const doyPadded = String(doy).padStart(3, '0');

            PRODUCTS.forEach(p => {
                const el = document.getElementById(`results-${domainId}-${p.channel}-${p.code}`);
                if(el) el.innerHTML = '<span class="text-slate-400 font-medium text-blue-500 animate-pulse">Scanning S3...</span>';
            });

            const keysFound = [];
            const prefixDomain = domainId.startsWith('M') ? 'M' : domainId;
            const prefixes = [`ABI-L2-DMW${prefixDomain}`, `ABI-L2-DMWV${prefixDomain}`];
            
            // Fetch all hours in parallel to drastically speed up scan
            const fetchPromises = [];
            for (let h=0; h<24; h++) {
                const hourPadded = String(h).padStart(2, '0');
                for (const p of prefixes) {
                    const fullPrefix = `${p}/${year}/${doyPadded}/${hourPadded}/`;
                    const url = `https://${bucket}.s3.amazonaws.com/?list-type=2&prefix=${fullPrefix}`;
                    fetchPromises.push(
                        fetch(url).then(async response => {
                            if (response.ok) {
                                const text = await response.text();
                                const xml = new DOMParser().parseFromString(text, "application/xml");
                                const keys = Array.from(xml.getElementsByTagName('Key')).map(n => n.textContent);
                                keysFound.push(...keys);
                            }
                        }).catch(e => console.error("Error fetching " + url, e))
                    );
                }
            }
            
            await Promise.all(fetchPromises);

            PRODUCTS.forEach(p => {
                const el = document.getElementById(`results-${domainId}-${p.channel}-${p.code}`);
                if(el) el.innerHTML = '';
            });

            // Sort keys chronologically
            keysFound.sort();

            keysFound.forEach(key => {
                const filename = key.split('/').pop();
                
                let pCode = "ABI-L2-DMW";
                if (filename.includes("DMWV")) pCode = "ABI-L2-DMWV";
                
                if (domainId.startsWith('M') && !filename.includes(`${pCode}${domainId}-`)) return;
                
                let pChan = null;
                if (filename.includes("C02_") || filename.includes("-C02_") || filename.includes("C02_")) pChan = "C02";
                else if (filename.includes("C07_") || filename.includes("-C07_") || filename.includes("C07_")) pChan = "C07";
                else if (filename.includes("C08_") || filename.includes("-C08_") || filename.includes("C08_")) pChan = "C08";
                else if (filename.includes("C09_") || filename.includes("-C09_") || filename.includes("C09_")) pChan = "C09";
                else if (filename.includes("C10_") || filename.includes("-C10_") || filename.includes("C10_")) pChan = "C10";
                else if (filename.includes("C14_") || filename.includes("-C14_") || filename.includes("C14_")) pChan = "C14";
                
                if (!pChan) return;

                const containerId = `results-${domainId}-${pChan}-${pCode}`;
                const targetContainer = document.getElementById(containerId);
                if (!targetContainer) return;

                const timeMatch = filename.match(/_s(\d{4})(\d{3})(\d{2})(\d{2})(\d{2})/);
                let timeStr = "Unk";
                if (timeMatch) timeStr = `${timeMatch[3]}:${timeMatch[4]}z`;

                const btn = document.createElement('button');
                btn.className = "bg-blue-50 hover:bg-blue-600 hover:text-white text-blue-700 border border-blue-200 px-2 py-0.5 rounded-sm text-[10px] font-medium cursor-pointer transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400";
                btn.textContent = timeStr;
                btn.title = filename;
                btn.onclick = () => handleBoxClick(key, bucket);
                targetContainer.appendChild(btn);
            });

            PRODUCTS.forEach(p => {
                const el = document.getElementById(`results-${domainId}-${p.channel}-${p.code}`);
                if(el && el.innerHTML === '') {
                    el.innerHTML = '<span class="text-slate-400 italic">No files available</span>';
                }
            });
        }

        function handleBoxClick(key, bucket) {
            const action = document.querySelector('input[name="clickAction"]:checked').value;
            const httpsUri = `https://${bucket}.s3.amazonaws.com/${key}`;
            const filename = key.split('/').pop();

            if (action === 'load') {
                window.dispatchEvent(new CustomEvent('load-dmw', { detail: { url: httpsUri, filename: filename } }));
            } else if (action === 'download') {
                const link = document.createElement('a');
                link.href = httpsUri;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("File download initiated!");
            }
        }

        function showToast(message) {
            copyToast.textContent = message;
            copyToast.style.display = 'block';
            setTimeout(() => copyToast.style.display = 'none', 2000);
        }

        // Animation UI Logic
        function formatMinutes(mins) {
            const h = String(Math.floor(mins / 60)).padStart(2, '0');
            const m = String(mins % 60).padStart(2, '0');
            return `${h}:${m}z`;
        }

        document.getElementById('animStart').oninput = (e) => document.getElementById('animStartVal').textContent = formatMinutes(e.target.value);
        document.getElementById('animEnd').oninput = (e) => document.getElementById('animEndVal').textContent = formatMinutes(e.target.value);

        document.getElementById('btnLoadAnim').onclick = async () => {
            const domainId = document.getElementById('animDomain').value;
            const domainSelect = document.getElementById('animDomain');
            const domainName = domainSelect.options[domainSelect.selectedIndex].text;
            const productIndex = document.getElementById('animProduct').value;
            const product = PRODUCTS[productIndex];
            const bucket = document.getElementById('satelliteSelect').value;
            
            const baseDateStr = document.getElementById('dateInput').value;
            if (!baseDateStr) {
                showToast("Please select a Target Date.");
                return;
            }

            const startMins = parseInt(document.getElementById('animStart').value);
            const endMins = parseInt(document.getElementById('animEnd').value);

            const startDate = new Date(baseDateStr + 'T00:00:00Z');
            startDate.setUTCMinutes(startMins);
            
            const endDate = new Date(baseDateStr + 'T00:00:00Z');
            endDate.setUTCMinutes(endMins);

            if (startDate >= endDate) {
                endDate.setUTCDate(endDate.getUTCDate() + 1);
            }

            document.getElementById('btnLoadAnim').disabled = true;
            document.getElementById('btnLoadAnim').textContent = "Scanning...";

            const prefixDomain = domainId.startsWith('M') ? 'M' : domainId;
            const pCode = product.code;
            const searchPrefix = `${pCode}${prefixDomain}`;

            const fetchPromises = [];
            let currentHour = new Date(startDate);
            currentHour.setUTCMinutes(0, 0, 0, 0);

            while (currentHour <= endDate) {
                const year = currentHour.getUTCFullYear();
                const startOfYear = new Date(Date.UTC(year, 0, 1));
                const doy = Math.floor((currentHour - startOfYear) / (1000 * 60 * 60 * 24)) + 1;
                const doyPadded = String(doy).padStart(3, '0');
                const hourPadded = String(currentHour.getUTCHours()).padStart(2, '0');

                const fullPrefix = `${searchPrefix}/${year}/${doyPadded}/${hourPadded}/`;
                const url = `https://${bucket}.s3.amazonaws.com/?list-type=2&prefix=${fullPrefix}`;

                fetchPromises.push(
                    fetch(url).then(async response => {
                        if (response.ok) {
                            const text = await response.text();
                            const xml = new DOMParser().parseFromString(text, "application/xml");
                            return Array.from(xml.getElementsByTagName('Key')).map(n => n.textContent);
                        }
                        return [];
                    }).catch(e => {
                        console.error("Error fetching " + url, e);
                        return [];
                    })
                );

                currentHour.setUTCHours(currentHour.getUTCHours() + 1);
            }

            const results = await Promise.all(fetchPromises);
            let keysFound = results.flat();

            keysFound = keysFound.filter(key => {
                const filename = key.split('/').pop();
                if (domainId.startsWith('M') && !filename.includes(`${pCode}${domainId}-`)) return false;
                
                let pChan = null;
                if (filename.includes("C02_") || filename.includes("-C02_") || filename.includes("C02_")) pChan = "C02";
                else if (filename.includes("C07_") || filename.includes("-C07_") || filename.includes("C07_")) pChan = "C07";
                else if (filename.includes("C08_") || filename.includes("-C08_") || filename.includes("C08_")) pChan = "C08";
                else if (filename.includes("C09_") || filename.includes("-C09_") || filename.includes("C09_")) pChan = "C09";
                else if (filename.includes("C10_") || filename.includes("-C10_") || filename.includes("C10_")) pChan = "C10";
                else if (filename.includes("C14_") || filename.includes("-C14_") || filename.includes("C14_")) pChan = "C14";

                if (pChan !== product.channel) return false;

                const timeMatch = filename.match(/_s(\d{4})(\d{3})(\d{2})(\d{2})(\d{2})/);
                if (!timeMatch) return false;

                const fYear = parseInt(timeMatch[1]);
                const fDoy = parseInt(timeMatch[2]);
                const fHour = parseInt(timeMatch[3]);
                const fMin = parseInt(timeMatch[4]);
                const fSec = parseInt(timeMatch[5]);

                const fDate = new Date(Date.UTC(fYear, 0, 1));
                fDate.setUTCDate(fDoy);
                fDate.setUTCHours(fHour, fMin, fSec);

                return fDate >= startDate && fDate <= endDate;
            });

            keysFound.sort();

            document.getElementById('btnLoadAnim').disabled = false;
            document.getElementById('btnLoadAnim').textContent = "Load Animation";

            if (keysFound.length === 0) {
                showToast("No frames found for the selected time range.");
                return;
            }

            const urls = keysFound.map(key => `https://${bucket}.s3.amazonaws.com/${key}`);
            const filenames = keysFound.map(key => key.split('/').pop());

            window.dispatchEvent(new CustomEvent('load-dmw-anim', { detail: { urls, filenames, domainName } }));
        };

        document.getElementById('mobile-menu-btn').onclick = () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
        };

        window.onload = () => {
            createSidebar();
            setTimeout(() => document.getElementById('btnLoadAnim').click(), 500);
        };
    </script>

    <!-- --- React Sandbox Application --- -->
    <script type="text/babel" data-type="module">
        import * as h5wasm from 'https://esm.sh/h5wasm@0.8.1';
        
        const { useState, useEffect, useCallback, useRef, createContext, useContext } = React;

        // Shared Filename Parsing Utility
        function parseFullDateFromFilename(filename) {
            if (!filename) return null;
            const match = filename.match(/_s(\d{4})(\d{3})(\d{2})(\d{2})(\d{2})/);
            if (match) {
                const year = parseInt(match[1]);
                const doy = parseInt(match[2]);
                const hour = parseInt(match[3]);
                const min = parseInt(match[4]);
                const date = new Date(Date.UTC(year, 0, 1));
                date.setUTCDate(doy);
                date.setUTCHours(hour, min, 0, 0);
                return date;
            }
            return null;
        }

        const NotificationContext = createContext();
        const useNotifier = () => useContext(NotificationContext);
        const NotificationProvider = ({ children }) => {
            const [notifications, setNotifications] = useState([]);
            const remove = useCallback(id => setNotifications(prev => prev.filter(n => n.id !== id)), []);
            const add = (message, type = 'info') => {
                const id = Date.now() + Math.random();
                setNotifications(prev => [...prev, { id, message, type }]);
                if (type !== 'error') setTimeout(() => remove(id), 5000);
            };
            return (
                <NotificationContext.Provider value={{ info: m => add(m, 'info'), success: m => add(m, 'success'), error: m => add(m, 'error') }}>
                    {children}
                    <div className="notification-container">
                        {notifications.map(n => (
                            <div key={n.id} className={`notification-toast notification-${n.type}`}>
                                <span style={{marginRight: '15px'}}>{n.message}</span>
                                <button style={{background:'none',border:'none',color:'white',cursor:'pointer',fontSize:'20px'}} onClick={() => remove(n.id)}>&times;</button>
                            </div>
                        ))}
                    </div>
                </NotificationContext.Provider>
            );
        };

        // Extraction Helpers
        const extractAttributes = (item) => {
            const obj = {};
            if (item && item.attrs) {
                for (let k in item.attrs) { obj[k] = item.attrs[k].value; }
            }
            return obj;
        };

        const findVar = (h5, group, name) => {
            if (!group) return null;
            const keys = Array.from(group.keys());
            if (keys.includes(name)) {
                const item = group.get(name);
                if (!(item instanceof h5.Group)) return item;
            }
            for (let k of keys) {
                const item = group.get(k);
                if (item instanceof h5.Group) {
                    const found = findVar(h5, item, name);
                    if (found) return found;
                }
            }
            return null;
        };

        const unpack = (v, fill) => {
            const raw = v.value;
            const attrs = extractAttributes(v);
            const scale = attrs.scale_factor ? attrs.scale_factor[0] : 1.0;
            const offset = attrs.add_offset ? attrs.add_offset[0] : 0.0;
            const fv = fill && attrs._FillValue ? attrs._FillValue[0] : null;
            const out = new Float32Array(raw.length);
            for(let i=0; i<raw.length; i++) {
                out[i] = (fill && raw[i] === fv) ? NaN : (raw[i] * scale) + offset;
            }
            return out;
        };

        // Math Helpers Ported from core/wind.py
        function spddir_to_uv(wspd, wdir) {
            const rad = wdir * (Math.PI / 180);
            const u = -wspd * Math.sin(rad);
            const v = -wspd * Math.cos(rad);
            return { u, v };
        }
        
        // Color mapping for wind speed (Jet approximation)
        function getDynamicColor(val, min, max) {
            let t = (max === min) ? 0 : Math.max(0, Math.min(1, (val - min) / (max - min)));
            const stops = [
                {v: 0.0, c: [0,0,139]}, {v: 0.2, c: [0,0,255]},
                {v: 0.4, c: [0,255,255]}, {v: 0.6, c: [0,255,0]},
                {v: 0.8, c: [255,255,0]}, {v: 1.0, c: [255,0,0]}
            ];
            for (let i = 0; i < stops.length - 1; i++) {
                if (t >= stops[i].v && t <= stops[i+1].v) {
                    const localT = (t - stops[i].v) / (stops[i+1].v - stops[i].v);
                    const r = Math.round(stops[i].c[0] + localT * (stops[i+1].c[0] - stops[i].c[0]));
                    const g = Math.round(stops[i].c[1] + localT * (stops[i+1].c[1] - stops[i].c[1]));
                    const b = Math.round(stops[i].c[2] + localT * (stops[i+1].c[2] - stops[i].c[2]));
                    return `rgba(${r},${g},${b},0.8)`; 
                }
            }
            return 'rgba(255,0,0,0.8)';
        }

        function DMWView({ layer, coastlineData, onClose }) {
            const containerRef = useRef(null);
            const canvasRef = useRef(null);
            const offscreenCanvasesRef = useRef([]); // Stores array of offscreen canvases for animation
            
            const [currentFrame, setCurrentFrame] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [transform, setTransform] = useState({ x: 0, y: 0, scale: 1 });
            const [settings, setSettings] = useState({ minSpeed: 5, barbSpacing: 1, showCoast: true });
            const [showSettings, setShowSettings] = useState(false);
            const [isClosing, setIsClosing] = useState(false);
            const [localMinSpeed, setLocalMinSpeed] = useState(settings.minSpeed);
            const [localBarbSpacing, setLocalBarbSpacing] = useState(settings.barbSpacing);
            const layerInitRef = useRef(null);
            
            const isDragging = useRef(false);
            const lastPos = useRef({ x:0, y:0 });

            useEffect(() => {
                setLocalMinSpeed(settings.minSpeed);
                setLocalBarbSpacing(settings.barbSpacing);
            }, [settings.minSpeed, settings.barbSpacing]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    setSettings(s => ({ ...s, minSpeed: localMinSpeed, barbSpacing: localBarbSpacing }));
                }, 300);
                return () => clearTimeout(timer);
            }, [localMinSpeed, localBarbSpacing]);

            useEffect(() => {
                const handleForcePlay = () => setIsPlaying(true);
                window.addEventListener('force-play', handleForcePlay);
                return () => window.removeEventListener('force-play', handleForcePlay);
            }, []);

            // Base internal coordinate system
            const BASE_SIZE = 2000;
            const projRef = useRef({ minLat: 0, maxLat: 0, minLon: 0, maxLon: 0, lonSpan: 1, latSpan: 1, width: BASE_SIZE, height: BASE_SIZE, shiftLon: false });

            // Generate Point Clouds for all frames
            const pointClouds = useRef([]);
            const maxSpd = useRef(1);

            useEffect(() => {
                if (!layer) return;
                
                const framesData = layer.isAnimation ? layer.frames : [layer];
                if (!framesData || framesData.length === 0) return;

                let shiftLon = false;
                let hasFarEast = false;
                let hasFarWest = false;
                for (let fIdx = 0; fIdx < framesData.length; fIdx++) {
                    const { lon, dqf } = framesData[fIdx].data;
                    for (let i = 0; i < lon.length; i++) {
                        const q = dqf ? dqf[i] : 0;
                        if (q === 0 && !isNaN(lon[i])) {
                            let normLn = lon[i] > 180 ? lon[i] - 360 : lon[i];
                            if (normLn > 90) hasFarEast = true;
                            if (normLn < -90) hasFarWest = true;
                            if (hasFarEast && hasFarWest) {
                                shiftLon = true;
                                break;
                            }
                        }
                    }
                    if (shiftLon) break;
                }

                const allPts = [];
                let minLat = 90, maxLat = -90, minLon = 1000, maxLon = -1000;
                let mxSpd = 0;

                for (let fIdx = 0; fIdx < framesData.length; fIdx++) {
                    const { lat, lon, wspd, wdir, dqf } = framesData[fIdx].data;
                    const pts = [];

                    for (let i=0; i<lat.length; i++) {
                        const lt = lat[i], ln = lon[i], s = wspd[i], d = wdir[i];
                        const q = dqf ? dqf[i] : 0;
                        
                        if (q === 0 && !isNaN(lt) && !isNaN(ln) && !isNaN(s) && !isNaN(d) && 
                            Math.abs(lt) > 0.00001 && Math.abs(ln) > 0.00001 && ln <= 360) {
                            
                            let nLn = ln > 180 ? ln - 360 : ln;
                            if (shiftLon && nLn < 0) {
                                nLn += 360;
                            }
                            if (s > mxSpd) mxSpd = s;
                            
                            pts.push({ lat: lt, lon: nLn, spd: s, dir: d });
                            
                            if (lt < minLat) minLat = lt;
                            if (lt > maxLat) maxLat = lt;
                            if (nLn < minLon) minLon = nLn;
                            if (nLn > maxLon) maxLon = nLn;
                        }
                    }
                    allPts.push(pts);
                }
                
                if (layerInitRef.current !== layer.id) {
                    layerInitRef.current = layer.id;
                    if (allPts.length > 0) {
                        const firstFramePts = allPts[0].length;
                        const targetPts = 10000;
                        if (firstFramePts > targetPts) {
                            const autoSkip = Math.ceil(firstFramePts / targetPts);
                            setSettings(s => ({ ...s, barbSpacing: autoSkip }));
                        }
                    }
                }
                
                pointClouds.current = allPts;
                maxSpd.current = Math.min(mxSpd, 75); // Cap to 75 m/s (~150 kts) for colors

                // Setup internal projection bounds
                const avgLat = (minLat + maxLat) / 2;
                const lonSpan = maxLon - minLon || 1;
                const latSpan = maxLat - minLat || 1;
                const aspect = (lonSpan * Math.cos(avgLat * Math.PI / 180)) / latSpan;
                
                projRef.current = {
                    minLat, maxLat, minLon, maxLon, lonSpan, latSpan,
                    width: BASE_SIZE, height: BASE_SIZE / aspect,
                    shiftLon
                };

                // Center projection initially
                if (containerRef.current) {
                    const { clientWidth, clientHeight } = containerRef.current;
                    const scale = Math.min(clientWidth / projRef.current.width, clientHeight / projRef.current.height) * 0.95;
                    const x = (clientWidth - projRef.current.width * scale) / 2;
                    const y = (clientHeight - projRef.current.height * scale) / 2;
                    setTransform({ x, y, scale });
                }

                renderOffscreen();
            }, [layer, settings.minSpeed, settings.barbSpacing, settings.showCoast, coastlineData]);

            // Draw to high-res offscreen canvas
            const renderOffscreen = useCallback(() => {
                const { width, height, minLat, maxLat, minLon, lonSpan, latSpan, shiftLon } = projRef.current;
                
                // Super sample for crisp vectors
                const scaleRes = 2.0; 
                offscreenCanvasesRef.current = [];

                const proj = (lt, ln) => ({
                    x: ((ln - minLon) / lonSpan) * width,
                    y: height - ((lt - minLat) / latSpan) * height
                });

                for (let fIdx = 0; fIdx < pointClouds.current.length; fIdx++) {
                    const offscreen = document.createElement('canvas');
                    offscreen.width = width * scaleRes;
                    offscreen.height = height * scaleRes;
                    const ctx = offscreen.getContext('2d');
                    ctx.scale(scaleRes, scaleRes);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    // Coastlines
                    if (settings.showCoast && coastlineData) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.lineWidth = 1.0;
                        ctx.beginPath();
                        coastlineData.forEach(f => {
                            if (!f.geometry) return;
                            const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
                            polys.forEach(p => p.forEach(ring => {
                                let first = true;
                                let prevLon = 0;
                                ring.forEach(pt => {
                                    let cLon = pt[0];
                                    if (shiftLon && cLon < 0) {
                                        cLon += 360;
                                    }
                                    const pos = proj(pt[1], cLon);
                                    if (first) {
                                        ctx.moveTo(pos.x, pos.y);
                                        first = false;
                                    } else {
                                        if (Math.abs(cLon - prevLon) > 180) {
                                            ctx.moveTo(pos.x, pos.y);
                                        } else {
                                            ctx.lineTo(pos.x, pos.y);
                                        }
                                    }
                                    prevLon = cLon;
                                });
                            }));
                        });
                        ctx.stroke();
                    }

                    // Vectors
                    const pts = pointClouds.current[fIdx];
                    const step = Math.max(1, settings.barbSpacing);
                    const maxPlotSpd = maxSpd.current;

                    for (let i = 0; i < pts.length; i += step) {
                        const pt = pts[i];
                        if (pt.spd < settings.minSpeed) continue;
                        
                        const pos = proj(pt.lat, pt.lon);
                        const { u, v } = spddir_to_uv(pt.spd, pt.dir);
                        
                        const dir = (270 - Math.atan2(v, u) * (180 / Math.PI)) % 360;
                        const angle = (dir - 90) * Math.PI / 180;
                        
                        ctx.save();
                        ctx.translate(pos.x, pos.y);
                        ctx.rotate(angle);
                        
                        const barbColor = getDynamicColor(pt.spd, 0, maxPlotSpd);
                        ctx.strokeStyle = barbColor;
                        ctx.fillStyle = barbColor;
                        ctx.lineWidth = 1.0;

                        const slen = 16;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(slen, 0);
                        ctx.stroke();

                        // Convert m/s to knots for barb drawing
                        const spdKts = pt.spd * 1.94384; 
                        let rem = Math.round(spdKts / 5) * 5;
                        let off = slen;
                        
                        const bAng = pt.lat > 0 ? Math.PI * 0.75 : -Math.PI * 0.75; 
                        const bLen = 8, penW = 3, penH = 6, pSpc = 7, bSpc = 4;

                        while (rem >= 50) {
                            ctx.beginPath();
                            ctx.moveTo(off, 0);
                            ctx.lineTo(off + Math.cos(bAng) * penW, Math.sin(bAng) * penH);
                            ctx.lineTo(off + Math.cos(bAng) * (penW * 2), 0);
                            ctx.fill();
                            off -= pSpc;
                            rem -= 50;
                        }
                        while (rem >= 10) {
                            ctx.beginPath();
                            ctx.moveTo(off, 0);
                            ctx.lineTo(off + Math.cos(bAng) * bLen, Math.sin(bAng) * bLen);
                            ctx.stroke();
                            off -= bSpc;
                            rem -= 10;
                        }
                        if (rem >= 5) {
                            ctx.beginPath();
                            ctx.moveTo(off, 0);
                            ctx.lineTo(off + Math.cos(bAng) * bLen * 0.5, Math.sin(bAng) * bLen * 0.5);
                            ctx.stroke();
                        }
                        ctx.restore();
                    }
                    offscreenCanvasesRef.current.push(offscreen);
                }
                
                renderToScreen();
            }, [layer, settings, coastlineData]);

            // Draw to screen
            const renderToScreen = useCallback(() => {
                const canvas = canvasRef.current;
                const viewDiv = containerRef.current;
                if (!canvas || !viewDiv || offscreenCanvasesRef.current.length === 0) return;
                
                const frameToDraw = offscreenCanvasesRef.current[currentFrame] || offscreenCanvasesRef.current[0];
                if (!frameToDraw) return;

                const dpr = window.devicePixelRatio || 1;
                canvas.width = viewDiv.clientWidth * dpr;
                canvas.height = viewDiv.clientHeight * dpr;
                const ctx = canvas.getContext('2d');
                
                ctx.scale(dpr, dpr);
                
                ctx.fillStyle = '#111'; 
                ctx.fillRect(0, 0, viewDiv.clientWidth, viewDiv.clientHeight);
                
                ctx.save();
                ctx.translate(transform.x, transform.y); 
                ctx.scale(transform.scale, transform.scale);
                
                const { width, height } = projRef.current;
                ctx.drawImage(frameToDraw, 0, 0, width, height);
                ctx.restore();

                // Draw Parsed Time (Bottom Left Corner)
                const frameData = layer.isAnimation ? layer.frames[currentFrame] : layer;
                const fname = frameData ? (frameData.filename || frameData.name) : '';
                if (fname) {
                    const dateObj = parseFullDateFromFilename(fname);
                    let timeStr = fname;
                    if (dateObj) {
                        const yyyy = dateObj.getUTCFullYear();
                        const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                        const dd = String(dateObj.getUTCDate()).padStart(2, '0');
                        const hh = String(dateObj.getUTCHours()).padStart(2, '0');
                        const min = String(dateObj.getUTCMinutes()).padStart(2, '0');
                        timeStr = `${yyyy}-${mm}-${dd} ${hh}:${min} UTC`;
                    }
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, viewDiv.clientHeight - 35, 230, 35);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 16px monospace';
                    ctx.fillText(timeStr, 10, viewDiv.clientHeight - 12);
                }
            }, [transform, currentFrame, layer]);

            useEffect(() => { renderToScreen(); }, [renderToScreen, transform, currentFrame]);

            useEffect(() => {
                let resizeTimer;
                const handleResize = () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        requestAnimationFrame(() => renderToScreen());
                    }, 250);
                };
                window.addEventListener('resize', handleResize);
                window.addEventListener('orientationchange', handleResize);
                return () => {
                    clearTimeout(resizeTimer);
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('orientationchange', handleResize);
                };
            }, [renderToScreen]);

            // Animation Loop
            useEffect(() => {
                let intervalId;
                if (layer.isAnimation && isPlaying && offscreenCanvasesRef.current.length > 1) {
                    intervalId = setInterval(() => {
                        setCurrentFrame(prev => (prev + 1) % offscreenCanvasesRef.current.length);
                    }, 600); 
                }
                return () => clearInterval(intervalId);
            }, [layer.isAnimation, isPlaying, offscreenCanvasesRef.current.length]);

            const handleMouse = (e) => {
                if (e.type === 'mousedown') { 
                    if (e.target.closest('.controls-float')) return;
                    isDragging.current = true; 
                    lastPos.current = { x: e.clientX, y: e.clientY }; 
                }
                else if (e.type === 'mouseup' || e.type === 'mouseleave') { 
                    isDragging.current = false; 
                }
                else if (e.type === 'mousemove' && isDragging.current) {
                    const dx = e.clientX - lastPos.current.x;
                    const dy = e.clientY - lastPos.current.y;
                    setTransform(t => ({ ...t, x: t.x + dx, y: t.y + dy }));
                    lastPos.current = { x: e.clientX, y: e.clientY };
                }
            };

            const handleWheel = (e) => {
                e.preventDefault();
                const factor = e.deltaY > 0 ? 0.95 : 1.05;
                setTransform(t => ({ ...t, scale: Math.max(0.05, t.scale * factor) }));
            };
            
            const lastPinchDist = useRef(null);

            const handleTouch = (e) => {
                if (e.cancelable) e.preventDefault();
                
                if (e.type === 'touchstart') {
                    if (e.touches.length === 1) {
                        isDragging.current = true;
                        lastPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    } else if (e.touches.length === 2) {
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        lastPinchDist.current = Math.sqrt(dx * dx + dy * dy);
                    }
                } else if (e.type === 'touchend' || e.type === 'touchcancel') {
                    isDragging.current = false;
                    lastPinchDist.current = null;
                } else if (e.type === 'touchmove') {
                    if (e.touches.length === 1 && isDragging.current) {
                        const dx = e.touches[0].clientX - lastPos.current.x;
                        const dy = e.touches[0].clientY - lastPos.current.y;
                        setTransform(t => ({ ...t, x: t.x + dx, y: t.y + dy }));
                        lastPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                    } else if (e.touches.length === 2 && lastPinchDist.current !== null) {
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const factor = dist / lastPinchDist.current;
                        setTransform(t => ({ ...t, scale: Math.max(0.05, t.scale * factor) }));
                        lastPinchDist.current = dist;
                    }
                }
            };
            
            const handleExport = () => {
                const link = document.createElement('a');
                link.download = `${layer.name.replace(/[^a-z0-9]/gi, '_')}.png`;
                const exportCanvas = offscreenCanvasesRef.current[currentFrame] || offscreenCanvasesRef.current[0];
                if(exportCanvas) {
                    link.href = exportCanvas.toDataURL('image/png');
                    link.click();
                }
            };

            let statusTimeStr = "";
            if (layer) {
                const frameData = layer.isAnimation ? layer.frames[currentFrame] : layer;
                const fname = frameData ? (frameData.filename || frameData.name) : '';
                if (fname) {
                    const dateObj = parseFullDateFromFilename(fname);
                    if (dateObj) {
                        const yyyy = dateObj.getUTCFullYear();
                        const mm = String(dateObj.getUTCMonth() + 1).padStart(2, '0');
                        const dd = String(dateObj.getUTCDate()).padStart(2, '0');
                        const hh = String(dateObj.getUTCHours()).padStart(2, '0');
                        const min = String(dateObj.getUTCMinutes()).padStart(2, '0');
                        statusTimeStr = `${yyyy}-${mm}-${dd} ${hh}:${min} UTC`;
                    } else {
                        statusTimeStr = fname;
                    }
                }
            }

            if (isClosing) return null;

            return (
                <div className="view-container">
                    <div className="view-header">
                        <span>{layer.title} - Derived Motion Winds</span>
                        <button className="btn-sm btn-danger" style={{width:'auto', margin:0}} onClick={() => { setIsClosing(true); setTimeout(onClose, 0); }}>Close</button>
                    </div>
                    
                    <div className="view-canvas-wrapper" ref={containerRef} onMouseDown={handleMouse} onMouseMove={handleMouse} onMouseUp={handleMouse} onMouseLeave={handleMouse} onWheel={handleWheel} onTouchStart={handleTouch} onTouchMove={handleTouch} onTouchEnd={handleTouch} onTouchCancel={handleTouch}>
                        <canvas ref={canvasRef} style={{position:'absolute', top:0, left:0, width:'100%', height:'100%'}} />
                        
                        <div className="controls-float" onMouseDown={e=>e.stopPropagation()} onMouseUp={e=>e.stopPropagation()} onMouseMove={e=>e.stopPropagation()} onWheel={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} onTouchEnd={e=>e.stopPropagation()} onTouchMove={e=>e.stopPropagation()}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }} onClick={() => setShowSettings(!showSettings)}>
                                <h4 style={{ margin: 0, borderBottom: showSettings ? '1px solid #444' : 'none', paddingBottom: showSettings ? '4px' : '0' }}>⚙️ Settings</h4>
                            </div>
                            {showSettings && (
                                <div style={{ marginTop: '10px' }}>
                                    <label>Min Spd: <span>{localMinSpeed}m/s</span></label>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                                        <button className="btn-sm" style={{ width: '25px', margin: 0 }} onClick={() => setLocalMinSpeed(Math.max(0, localMinSpeed - 1))}>-</button>
                                        <input type="number" min="0" max="30" value={localMinSpeed} onChange={e => setLocalMinSpeed(parseInt(e.target.value) || 0)} style={{ width: '40px', background: '#333', color: 'white', border: '1px solid #555', textAlign: 'center', borderRadius: '3px', fontSize: '11px', padding: '2px 0' }} />
                                        <button className="btn-sm" style={{ width: '25px', margin: 0 }} onClick={() => setLocalMinSpeed(localMinSpeed + 1)}>+</button>
                                    </div>
                                    
                                    <label style={{marginTop:'5px'}}>Skip Factor: <span>{localBarbSpacing}</span></label>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '5px' }}>
                                        <button className="btn-sm" style={{ width: '25px', margin: 0 }} onClick={() => setLocalBarbSpacing(Math.max(1, localBarbSpacing - 1))}>-</button>
                                        <input type="number" min="1" max="50" value={localBarbSpacing} onChange={e => setLocalBarbSpacing(parseInt(e.target.value) || 1)} style={{ width: '40px', background: '#333', color: 'white', border: '1px solid #555', textAlign: 'center', borderRadius: '3px', fontSize: '11px', padding: '2px 0' }} />
                                        <button className="btn-sm" style={{ width: '25px', margin: 0 }} onClick={() => setLocalBarbSpacing(localBarbSpacing + 1)}>+</button>
                                    </div>
                                    
                                    <label style={{marginTop:'10px', justifyContent:'flex-start', cursor:'pointer'}}>
                                        <input type="checkbox" checked={settings.showCoast} onChange={e => setSettings(s => ({...s, showCoast: e.target.checked}))} style={{marginRight:'8px'}}/> Coastlines
                                    </label>

                                    <button className="btn-sm" onClick={handleExport} style={{marginTop: '15px'}}>Export View (PNG)</button>
                                </div>
                            )}
                        </div>
                        
                        <div id="legend-container">
                            <div style={{fontSize:'10px', textAlign:'center', marginBottom:'4px'}}>WIND SPEED (m/s)</div>
                            <div id="legend"></div>
                            <div id="legend-labels"><span>0</span><span>{Math.round(maxSpd.current)}</span></div>
                        </div>
                    </div>
                    
                    {layer.isAnimation && (
                        <div className="view-status-bar">
                            <button onClick={() => setIsPlaying(!isPlaying)} style={{ background: '#4db8ff', color: '#000', border: 'none', padding: '4px 12px', borderRadius: '4px', cursor: 'pointer', fontWeight: 'bold', minWidth: '65px' }}>
                                {isPlaying ? 'Pause' : 'Play'}
                            </button>
                            <input type="range" min="0" max={Math.max(0, (layer.frames?.length || 1) - 1)} value={currentFrame} onChange={e => {
                                setIsPlaying(false);
                                setCurrentFrame(parseInt(e.target.value));
                            }} style={{ flexGrow: 1, cursor: 'pointer' }} />
                            <div style={{ fontWeight: 'bold', minWidth: '150px', textAlign: 'right', fontFamily: 'monospace' }}>
                                {statusTimeStr}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const notifier = useNotifier();
            const [ready, setReady] = useState(false);
            const [layers, setLayers] = useState([]);
            const [activeLayerId, setActiveLayerId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [coastline, setCoastline] = useState(null);
            const [animProgress, setAnimProgress] = useState(null);

            useEffect(() => {
                h5wasm.ready.then(() => setReady(true));
                
                const fetchMaps = async () => {
                    try {
                        const urls = [
                            './maps/world-110m.json',
                            './maps/states-10m.json',
                            './maps/canada-provinces.json',
                            './maps/brazil-states.json'
                        ];
                        
                        const responses = await Promise.all(urls.map(url => fetch(url).catch(e => null)));
                        const jsons = [];
                        
                        for (const res of responses) {
                            if (res && res.ok) {
                                try {
                                    jsons.push(await res.json());
                                } catch (e) {
                                    console.warn("Failed to parse map JSON:", res.url);
                                }
                            } else if (res) {
                                console.warn("Failed to fetch map:", res.url, res.status);
                            }
                        }
                        
                        let allFeatures = [];
                        jsons.forEach(data => {
                            if (!data || !data.objects) return;
                            const keys = Object.keys(data.objects);
                            // Explicitly target countries/states if available, otherwise take the first key
                            const targetKey = keys.includes('countries') ? 'countries' : (keys.includes('states') ? 'states' : keys[0]);
                            const feats = topojson.feature(data, data.objects[targetKey]).features;
                            allFeatures = allFeatures.concat(feats);
                        });
                        
                        setCoastline(allFeatures);
                    } catch (err) {
                        console.error("Map Atlas Load Error:", err);
                    }
                };
                
                fetchMaps();
            }, []);

            useEffect(() => {
                const handleLoadNetcdf = (e) => fetchFileUrl(e.detail.url, e.detail.filename);
                const handleLoadAnim = (e) => fetchAnimSequence(e.detail.urls, e.detail.filenames, e.detail.domainName);
                
                window.addEventListener('load-dmw', handleLoadNetcdf);
                window.addEventListener('load-dmw-anim', handleLoadAnim);
                
                return () => {
                    window.removeEventListener('load-dmw', handleLoadNetcdf);
                    window.removeEventListener('load-dmw-anim', handleLoadAnim);
                };
            }, []);

            const fetchFileUrl = async (url, explicitName = null) => {
                setLoading(true);
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const buffer = await response.arrayBuffer();
                    await handleUpload(buffer, explicitName || url.split('/').pop());
                } catch (error) {
                    notifier.error(`Failed to load URL: ${error.message}`);
                }
                setLoading(false);
            };

            const fetchAnimSequence = async (urls, filenames, domainName) => {
                setAnimProgress(0);
                try {
                    // Load latest image first
                    const lastIdx = urls.length - 1;
                    const res = await fetch(urls[lastIdx]);
                    const buf = await res.arrayBuffer();
                    const baseLayerId = await handleUpload(buf, filenames[lastIdx]);

                    const frames = [];
                    for (let i = 0; i < urls.length; i++) {
                        setAnimProgress(Math.round(((i) / urls.length) * 100));
                        const response = await fetch(urls[i]);
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const buffer = await response.arrayBuffer();
                        
                        const id = `f${Date.now()}_${i}`;
                        h5wasm.FS.writeFile(id, new Uint8Array(buffer));
                        const f = new h5wasm.File(id, 'r');
                        const root = f.get('/');
                        
                        const latVar = findVar(h5wasm, root, 'lat');
                        const lonVar = findVar(h5wasm, root, 'lon');
                        const wspdVar = findVar(h5wasm, root, 'wind_speed');
                        const wdirVar = findVar(h5wasm, root, 'wind_direction');

                        if (!latVar || !lonVar || !wspdVar || !wdirVar) {
                            f.close();
                            h5wasm.FS.unlink(id);
                            continue;
                        }

                        const lat = unpack(latVar, false);
                        const lon = unpack(lonVar, false);
                        const wspd = unpack(wspdVar, true);
                        const wdir = unpack(wdirVar, true);
                        const dqfVar = findVar(h5wasm, root, 'DQF');
                        const dqf = dqfVar ? unpack(dqfVar, false) : null;

                        frames.push({
                            filename: filenames[i],
                            data: { lat, lon, wspd, wdir, dqf }
                        });
                        
                        f.close();
                        h5wasm.FS.unlink(id);
                    }
                    
                    setAnimProgress(100);
                    setTimeout(() => setAnimProgress(null), 500);
                    
                    let timeRangeStr = "";
                    const d1 = parseFullDateFromFilename(filenames[0]);
                    const d2 = parseFullDateFromFilename(filenames[filenames.length - 1]);
                    if (d1 && d2) {
                        const m1 = String(d1.getUTCMonth() + 1).padStart(2, '0');
                        const day1 = String(d1.getUTCDate()).padStart(2, '0');
                        const h1 = String(d1.getUTCHours()).padStart(2, '0');
                        const min1 = String(d1.getUTCMinutes()).padStart(2, '0');
                        
                        const m2 = String(d2.getUTCMonth() + 1).padStart(2, '0');
                        const day2 = String(d2.getUTCDate()).padStart(2, '0');
                        const h2 = String(d2.getUTCHours()).padStart(2, '0');
                        const min2 = String(d2.getUTCMinutes()).padStart(2, '0');
                        
                        if (d1.getUTCDate() === d2.getUTCDate() && d1.getUTCMonth() === d2.getUTCMonth()) {
                            timeRangeStr = `${m1}-${day1} ${h1}:${min1} - ${h2}:${min2}`;
                        } else {
                            timeRangeStr = `${m1}-${day1} ${h1}:${min1} - ${m2}-${day2} ${h2}:${min2}`;
                        }
                    }
                    
                    if (frames.length > 0) {
                        if (baseLayerId) {
                            setLayers(prev => prev.map(l => {
                                if (l.id === baseLayerId) {
                                    return {
                                        ...l,
                                        isAnimation: true,
                                        frames: frames,
                                        name: `${domainName} Animation`,
                                        title: `${domainName} Animation Sequence`,
                                        timeRangeStr: timeRangeStr
                                    };
                                }
                                return l;
                            }));
                        } else {
                            const layerId = `anim_${Date.now()}`;
                            const layer = {
                                id: layerId,
                                name: `${domainName} Animation`,
                                title: `${domainName} Animation Sequence`,
                                isAnimation: true,
                                frames: frames,
                                timeRangeStr: timeRangeStr
                            };
                            setLayers(prev => [...prev, layer]);
                        }
                    }
                } catch (error) {
                    setAnimProgress(null);
                    notifier.error(`Failed to load animation: ${error.message}`);
                }
            };

            const handleUpload = async (buf, name) => {
                setLoading(true);
                let createdId = null;
                try {
                    const id = `f${Date.now()}`;
                    h5wasm.FS.writeFile(id, new Uint8Array(buf));
                    const f = new h5wasm.File(id, 'r');
                    const root = f.get('/');
                    
                    const latVar = findVar(h5wasm, root, 'lat');
                    const lonVar = findVar(h5wasm, root, 'lon');
                    const wspdVar = findVar(h5wasm, root, 'wind_speed');
                    const wdirVar = findVar(h5wasm, root, 'wind_direction');

                    if (!latVar || !lonVar || !wspdVar || !wdirVar) {
                        throw new Error("Missing required DMW variables (lat, lon, wind_speed, wind_direction)");
                    }

                    const lat = unpack(latVar, false);
                    const lon = unpack(lonVar, false);
                    const wspd = unpack(wspdVar, true);
                    const wdir = unpack(wdirVar, true);
                    const dqfVar = findVar(h5wasm, root, 'DQF');
                    const dqf = dqfVar ? unpack(dqfVar, false) : null;

                    // Parse a cleaner name
                    let domainStr = "Image";
                    if (name.includes('DMWF')) domainStr = "Full Disk";
                    else if (name.includes('DMWC')) domainStr = "CONUS";
                    else if (name.includes('DMWM1')) domainStr = "Meso 1";
                    else if (name.includes('DMWM2')) domainStr = "Meso 2";
                    
                    const d1 = parseFullDateFromFilename(name);
                    let timeRangeStr = "";
                    let niceName = name;
                    if (d1) {
                        const m1 = String(d1.getUTCMonth() + 1).padStart(2, '0');
                        const day1 = String(d1.getUTCDate()).padStart(2, '0');
                        const h1 = String(d1.getUTCHours()).padStart(2, '0');
                        const min1 = String(d1.getUTCMinutes()).padStart(2, '0');
                        timeRangeStr = `${m1}-${day1} ${h1}:${min1}`;
                        niceName = domainStr;
                    }

                    const layer = {
                        id, name: niceName, title: name, timeRangeStr: timeRangeStr,
                        data: { lat, lon, wspd, wdir, dqf },
                        globalAttrs: extractAttributes(root)
                    };
                    
                    setLayers(prev => [...prev, layer]);
                    setActiveLayerId(id);
                    createdId = id;
                    notifier.success(`Loaded DMW Point Cloud: ${name}`);
                    
                    f.close(); 
                    h5wasm.FS.unlink(id);
                } catch (e) { 
                    notifier.error(e.message); 
                }
                setLoading(false);
                return createdId;
            };

            const removeLayer = (id) => {
                setLayers(prev => {
                    const nextLayers = prev.filter(l => l.id !== id);
                    if (activeLayerId === id) {
                        setActiveLayerId(nextLayers.length > 0 ? nextLayers[nextLayers.length - 1].id : null);
                    }
                    return nextLayers;
                });
            };

            if (!ready) return <div className="loading-overlay">Initializing Engine...</div>;

            return (
                <div className="main-layout">
                    <div className="content-grid" style={{ display: 'flex', flexDirection: 'column', gap: 0, padding: '15px 8px 8px 8px' }}>
                        {layers.length > 0 && (
                            <div className="no-scrollbar" style={{ display: 'flex', paddingLeft: '110px', overflowX: 'auto', flexShrink: 0 }}>
                                {layers.map(l => {
                                    const isActive = activeLayerId === l.id;
                                    return (
                                        <button 
                                            key={l.id} 
                                            onClick={() => setActiveLayerId(l.id)}
                                            style={{
                                                padding: '8px 16px',
                                                backgroundColor: isActive ? '#495057' : '#343a40',
                                                color: isActive ? '#fff' : '#9ca3af',
                                                border: 'none',
                                                borderRadius: '8px 8px 0 0',
                                                cursor: 'pointer',
                                                fontSize: '13px',
                                                fontWeight: isActive ? 'bold' : 'normal',
                                                whiteSpace: 'nowrap',
                                                marginRight: '2px',
                                                position: 'relative',
                                                paddingBottom: isActive ? '12px' : '8px',
                                                marginBottom: isActive ? '-4px' : '0',
                                                zIndex: isActive ? 10 : 1,
                                                boxShadow: isActive ? '0 -2px 10px rgba(0,0,0,0.2)' : 'none'
                                            }}
                                        >
                                            {l.name} {l.timeRangeStr ? `(${l.timeRangeStr})` : ''}
                                        </button>
                                    );
                                })}
                            </div>
                        )}
                        {layers.length === 0 ? (
                            <div style={{display:'flex', alignItems:'center', justifyContent:'center', height:'100%', backgroundColor: '#111'}}></div>
                        ) : (
                            layers.filter(l => l.id === activeLayerId).map(l => (
                                <DMWView key={l.id} layer={l} coastlineData={coastline} onClose={() => removeLayer(l.id)} />
                            ))
                        )}
                        
                        {animProgress !== null && (
                            <div style={{position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', width: '300px', background: '#1e293b', padding: '20px', borderRadius: '10px', zIndex: 3000, boxShadow: '0 4px 15px rgba(0,0,0,0.5)', textAlign: 'center'}}>
                                <div style={{color: 'white', marginBottom: '10px', fontSize: '14px', fontWeight: 'bold'}}>Loading Animation... {animProgress}%</div>
                                <div style={{width: '100%', height: '10px', background: '#334155', borderRadius: '5px', overflow: 'hidden'}}>
                                    <div style={{width: `${animProgress}%`, height: '100%', background: '#22c55e', transition: 'width 0.2s'}}></div>
                                </div>
                            </div>
                        )}
                    </div>
                    {loading && <div className="loading-overlay"><div>Processing Data...</div></div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<NotificationProvider><App /></NotificationProvider>);
    </script>
</body>
</html>
